<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>update</title>
  </head>
  <body>
    <h1>Updating Post</h1>

    <form action="{% url 'diary:update_post' update_diary.id %}" method="post"  enctype="multipart/form-data">
      {% csrf_token %}
      <p>제목: <input type="text" name="title" value="{{update_diary.title}}" /></p>
      본문 :
      <textarea name="content" cols="30" rows="10">{{update_diary.content}}</textarea>
      <p>현재 이미지:
        {% if update_diary.photo %}
          <img src="{{ update_diary.photo.url }}" width="200" />
                <input type="checkbox" name="photo-clear"> 이미지 삭제
        {% else %}
          없음
        {% endif %}
      </p>

       <p>새 이미지: <input type="file" name="photo" /></p>
      <p>해시태그: <input type="text" name="hashtag" /></p>
      <button type="submit">수정하기</button>
    </form>
  </body>
</html>
